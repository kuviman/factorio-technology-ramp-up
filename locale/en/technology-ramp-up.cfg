[mod-setting-name]
technology-ramp-up-initial-multiplier=Starting Multiplier
technology-ramp-up-final-multiplier=Final Multiplier
technology-ramp-up-final-technology=Final Technology
technology-ramp-up-skip-initial-triggers=Skip Initial Trigger Technologies
technology-ramp-up-go-beyond-final-multiplier=Go beyond final multiplier

[mod-setting-description]
technology-ramp-up-initial-multiplier=Initial value of the technology multiplier (technologies with no prerequisites).
technology-ramp-up-final-multiplier=Final value of the technology multiplier (deepest technology, or technology specified by the 'Final technology' field)\nMust be greater than the initial multiplier.
technology-ramp-up-final-technology=Final technology (where the multiplier stops increasing). Must be the valid internal name of a technology, or blank (no final technology).
technology-ramp-up-skip-initial-triggers=When calculating a technology's depth, it skips any initial trigger technologies (ones that do not depend on any pack-researched technologies, like the automation science pack trigger technology in normal Factorio).\nI.e. it will calculate technology depths as if those initial trigger technologies were removed completely from the tech tree.
technology-ramp-up-go-beyond-final-multiplier=Go beyond final multiplier (keep ramping infinitely)
